name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set application.yml values
        uses: microsoft/variable-substitution@v1
        with:
          files: src/main/resources/application.yml
        env:
          spring.datasource.url: ${{ secrets.DB_URL }}
          spring.datasource.username: ${{ secrets.DB_USERNAME }}
          spring.datasource.password: ${{ secrets.DB_PASSWORD }}
          application.jwt.secretKey: ${{ secrets.JWT_SECRET_KEY }}
          spring.data.redis.host: ${{ secrets.REDIS_HOST }}
          spring.data.redis.password: ${{ secrets.REDIS_PASSWORD }}
          spring.mail.port: ${{ secrets.SMTP_PORT }}
          spring.mail.username: ${{ secrets.SMTP_USERNAME }}
          spring.mail.password: ${{ secrets.SMTP_PASSWORD }}
          stt.base-url: ${{ secrets.STT_AI_SERVER_URL }}
          application.hmac.secret-key: ${{ secrets.HMAC_SECRET_KEY }}
          application.phone.hash-salt: ${{ secrets.PHONE_HASH_SALT }}
          nice.pass.base-url: ${{ secrets.NICE_PASS_BASE_URL }}
          nice.pass.client-id: ${{ secrets.NICE_PASS_CLIENT_ID }}
          nice.pass.client-secret: ${{ secrets.NICE_PASS_CLIENT_SECRET }}
          apple.iap.bundle-id: ${{ secrets.APPLE_BUNDLE_ID }}
          apple.iap.issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          apple.iap.key-id: ${{ secrets.APPLE_KEY_ID }}
          apple.iap.private-key: ${{ secrets.APPLE_PRIVATE_KEY }}
          apple.iap.app-apple-id: ${{ secrets.APPLE_APP_ID }}
          google.iap.package-name: ${{ secrets.GOOGLE_PACKAGE_NAME }}
          google.iap.subscription-id: ${{ secrets.GOOGLE_SUBSCRIPTION_ID }}
          toss.payments.secret-key: ${{ secrets.TOSS_SECRET_KEY }}
          toss.payments.client-key: ${{ secrets.TOSS_CLIENT_KEY }}
          app.client.sign-in-url: ${{ secrets.APP_CLIENT_SIGN_IN_URL }}
          application.webauthn.rp-id: ${{ secrets.WEBAUTHN_RP_ID }}
          application.webauthn.allowed-origins: ${{ secrets.WEBAUTHN_ORIGIN }}
          application.actuator.bearer-token: ${{ secrets.ACTUATOR_TOKEN }}

      - name: Create GCP Service Account Key File
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.GCP_SERVICE_KEY_GCS }}' > src/main/resources/bigtablet-demo-gcs.json
          echo '${{ secrets.GOOGLE_IAP_KEY }}' > src/main/resources/bigtablet-demo-iap.json
          echo '${{ secrets.FIREBASE_JSON }}' > src/main/resources/bigtablet-demo-firebase-adminsdk-fbsvc-d375be34b3.json

      - name: chmod gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace build -x test

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Slack notify (success)
        if: needs.build.result == 'success'
        env:
          GIT_SLACK_WEBHOOK_URL: ${{ secrets.GIT_SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                text: "✅ CI 빌드 성공",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: "*✅ CI 빌드 성공*\n*Repo:* \($repo)\n*Branch:* main\n*SHA:* \($sha | .[0:7])\n*Actor:* \($actor)\n*Run:* <\($url)|Open Actions Run>"
                    }
                  }
                ]
              }')" \
            "$GIT_SLACK_WEBHOOK_URL"

      - name: Slack notify (failure)
        if: needs.build.result == 'failure'
        env:
          GIT_SLACK_WEBHOOK_URL: ${{ secrets.GIT_SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                text: "❌ CI 빌드 실패",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: "*❌ CI 빌드 실패*\n*Repo:* \($repo)\n*Branch:* main\n*SHA:* \($sha | .[0:7])\n*Actor:* \($actor)\n*Run:* <\($url)|Open Actions Run>"
                    }
                  }
                ]
              }')" \
            "$GIT_SLACK_WEBHOOK_URL"
