name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: chmod gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace build -x test
